<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IONIC_LION_V21 | SUPREME EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Cairo:wght@400;700;900&display=swap');
        
        :root { --ionic-color: #00f2ff; --bg: #000; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; user-select: none; }

        /* محرك التصفح (Ionic-Engine) */
        .scroll-engine { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; -webkit-overflow-scrolling: touch; position: relative; z-index: 10; }
        .scroll-engine::-webkit-scrollbar { display: none; }
        
        .v-seg { height: 100vh; width: 100vw; scroll-snap-align: start; scroll-snap-stop: always; position: relative; overflow: hidden; background: #000; }
        
        /* تأثير الثقب الأسود مع تلاشي أطراف احترافي */
        video { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; 
            filter: brightness(0.8) contrast(1.1); 
            z-index: 5;
            -webkit-mask-image: radial-gradient(circle at center, black 30%, rgba(0,0,0,0.4) 65%, transparent 95%);
            mask-image: radial-gradient(circle at center, black 30%, rgba(0,0,0,0.4) 65%, transparent 95%);
        }

        /* العلامة المائية */
        .watermark { position: absolute; top: 50%; right: 10px; transform: translateY(-50%) rotate(-90deg); font-family: 'Orbitron'; font-size: 10px; font-weight: 900; color: rgba(255,255,255,0.15); letter-spacing: 5px; z-index: 45; pointer-events: none; }

        /* الساعة الرقمية التكتيكية */
        .digital-clock { position: fixed; top: 35px; left: 25px; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); padding: 8px 15px; border-radius: 12px; border: 1px solid var(--ionic-color); font-family: 'Orbitron'; font-size: 14px; color: var(--ionic-color); box-shadow: 0 0 15px var(--ionic-color); z-index: 1000; }

        /* الأزرار الجانبية الملونة */
        .sidebar-ops { position: absolute; left: 20px; top: 55%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 20px; z-index: 100; }
        .op-btn { width: 58px; height: 58px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid var(--ionic-color); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.4s; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .op-btn i { font-size: 20px; color: var(--ionic-color); text-shadow: 0 0 10px var(--ionic-color); }
        .op-btn span { font-size: 9px; font-family: 'Orbitron'; color: #fff; margin-top: 3px; font-weight: bold; }

        /* الواجهة الأمامية */
        header { position: fixed; top: 30px; right: 25px; z-index: 500; pointer-events: none; }
        .brand-box { background: rgba(0,0,0,0.4); padding: 10px 20px; border-right: 4px solid var(--ionic-color); backdrop-filter: blur(15px); border-radius: 8px; display: flex; align-items: center; gap: 12px; }

        nav { position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 400px; height: 75px; background: rgba(0, 5, 10, 0.7); backdrop-filter: blur(25px); border: 1px solid var(--ionic-color); border-radius: 40px; display: flex; justify-content: space-around; align-items: center; z-index: 500; }
        .plasma-core { width: 80px; height: 80px; background: linear-gradient(135deg, var(--ionic-color), #0044ff); border-radius: 50%; margin-top: -45px; display: flex; align-items: center; justify-content: center; border: 5px solid #000; box-shadow: 0 0 25px var(--ionic-color); cursor: pointer; }

        #admin-panel { position: fixed; inset: 0; z-index: 2000; background: rgba(0, 0, 0, 0.98); display: none; flex-direction: column; padding: 40px; }
    </style>
</head>
<body>

    <div class="digital-clock" id="ionic-clock">00:00:00</div>
    
    <header>
        <div class="brand-box">
            <i class="fas fa-lion text-2xl" id="lion-icon" style="color: var(--ionic-color);"></i>
            <span class="font-[Orbitron] text-[13px] font-black tracking-[4px] text-white">LION_V21</span>
        </div>
    </header>

    <main class="scroll-engine" id="video-stack"></main>

    <nav>
        <div class="cursor-pointer text-white/30" onclick="checkAdmin()"><i class="fas fa-shield-halved text-2xl"></i></div>
        <div class="plasma-core" onclick="openUpload()"><i class="fas fa-plus text-white text-3xl"></i></div>
        <div class="cursor-pointer text-white/30" onclick="window.open(ADS.SHARE, '_blank')"><i class="fas fa-share-nodes text-2xl"></i></div>
    </nav>

    <div id="admin-panel">
        <div class="flex justify-between items-center mb-8 border-b border-cyan-900 pb-4">
            <h2 class="font-[Orbitron] text-red-500 text-xl font-bold">SYSTEM_PURGE</h2>
            <i class="fas fa-xmark text-3xl text-white cursor-pointer" onclick="closeAdmin()"></i>
        </div>
        <div id="admin-list" class="space-y-4 overflow-y-auto"></div>
    </div>

    <script>
        const ADS = {
            LIKE: "https://www.effectivegatecpm.com/kckhwnffm5?key=a044912bc242a8918aac753c22e082b1",
            SHARE: "https://www.effectivegatecpm.com/xbht9gqc?key=13bf2e14db4efc9eb9f9e55fe90705ef",
            AUDIO: "http://canarytokens.com/articles/6ruq89xrmgt9a11ird1kv88co/post.jsp"
        };

        const firebaseConfig = { databaseURL: "https://vexe-f6558-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const widget = cloudinary.createUploadWidget({ 
            cloudName: "duzoqh3jp", uploadPreset: "so_34k", 
            sources: ['local', 'camera'], clientAllowedFormats: ["video"]
        }, (err, res) => {
            if (!err && res.event === "success") db.ref('videos/').push({ url: res.info.secure_url, likes: 0, timestamp: Date.now() });
        });
        function openUpload() { widget.open(); }

        const ionicColors = ['#00f2ff', '#ff007f', '#00ff88', '#ffcc00', '#9d00ff'];

        db.ref('videos').on('value', (snap) => {
            const container = document.getElementById('video-stack');
            const adminList = document.getElementById('admin-list');
            container.innerHTML = ''; adminList.innerHTML = '';
            const data = snap.val();
            if(!data) return;

            Object.keys(data).reverse().forEach(id => {
                const vid = data[id];
                const section = document.createElement('section');
                section.className = 'v-seg';
                section.innerHTML = `
                    <div class="watermark">VOID_LION_PRO</div>
                    <video id="vid-${id}" loop playsinline muted data-src="${vid.url}" onclick="this.paused?this.play():this.pause()"></video>
                    <div class="sidebar-ops">
                        <div class="op-btn" onclick="window.open(ADS.LIKE, '_blank'); triggerLike('${id}')">
                            <i class="fas fa-bolt"></i>
                            <span>${vid.likes || 0}</span>
                        </div>
                        <div class="op-btn" id="mute-btn-${id}" onclick="toggleMute('${id}')">
                            <i class="fas fa-volume-xmark"></i>
                            <span>MUTE</span>
                        </div>
                        <div class="op-btn" onclick="window.open(ADS.SHARE, '_blank')">
                            <i class="fas fa-up-right-from-square"></i>
                            <span>GO</span>
                        </div>
                    </div>`;
                container.appendChild(section);

                adminList.innerHTML += `<div class="bg-white/5 p-4 rounded-xl flex justify-between items-center border border-white/10">
                    <span class="font-mono text-xs text-cyan-400">${id.substring(0,8)}</span>
                    <button onclick="deleteVid('${id}')" class="text-red-500"><i class="fas fa-trash"></i></button></div>`;
            });
            initObserver();
        });

        function initObserver() {
            const obs = new IntersectionObserver((es) => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if (e.isIntersecting) { 
                        if(!v.src) v.src = v.dataset.src;
                        v.play().catch(()=>{}); 
                        // تغيير اللون الأيوني تلقائياً مع كل فيديو
                        const newColor = ionicColors[Math.floor(Math.random() * ionicColors.length)];
                        document.documentElement.style.setProperty('--ionic-color', newColor);
                    } else { v.pause(); }
                });
            }, { threshold: 0.7 });
            document.querySelectorAll('.v-seg').forEach(s => obs.observe(s));
        }

        function toggleMute(id) {
            const v = document.getElementById('vid-'+id);
            const btn = document.getElementById('mute-btn-'+id);
            v.muted = !v.muted;
            btn.innerHTML = v.muted ? '<i class="fas fa-volume-xmark"></i><span>MUTE</span>' : '<i class="fas fa-volume-high" style="color:white"></i><span>LIVE</span>';
        }

        function checkAdmin() { if(prompt("ACCESS:") === "1234") document.getElementById('admin-panel').style.display = 'flex'; }
        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
        function deleteVid(id) { if(confirm("Delete?")) db.ref('videos/' + id).remove(); }
        function triggerLike(id) { db.ref('videos/' + id + '/likes').transaction(l => (l || 0) + 1); }

        setInterval(() => { 
            const now = new Date();
            document.getElementById('ionic-clock').innerText = now.toLocaleTimeString('en-GB'); 
        }, 1000);
    </script>
</body>
</html>
