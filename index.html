<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZENITH_ARC | MODERN FLOW</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;600&family=Outfit:wght@400;800&display=swap');
        
        :root { --accent: #38bdf8; --bg: #0f172a; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: #f8fafc; font-family: 'Inter', sans-serif; user-select: none; }

        .app-bg { position: fixed; inset: 0; z-index: -1; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        
        .scroll-engine { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; scroll-behavior: smooth; }
        .scroll-engine::-webkit-scrollbar { display: none; }
        
        .video-segment { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; }
        
        .glass-card { width: 90%; height: 85%; border-radius: 40px; overflow: hidden; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px); position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }

        header { position: fixed; top: 30px; left: 0; right: 0; z-index: 500; display: flex; justify-content: center; pointer-events: none; }
        .brand-box { padding: 12px 30px; border-radius: 50px; background: rgba(0,0,0,0.2); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .brand-name { font-family: 'Outfit', sans-serif; font-weight: 800; letter-spacing: 3px; color: var(--accent); }

        .side-actions { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 20px; z-index: 100; }
        .action-btn { width: 50px; height: 50px; border-radius: 18px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s; }
        .action-btn:hover { background: var(--accent); color: var(--bg); }
        .btn-label { font-size: 8px; font-weight: 600; margin-top: 2px; }

        nav { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 80%; max-width: 350px; height: 70px; border-radius: 25px; background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-around; align-items: center; z-index: 200; }
        
        #upload-trigger { background: var(--accent); color: var(--bg); width: 55px; height: 55px; border-radius: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        #admin-panel, #chat-overlay { position: fixed; inset: 0; z-index: 1000; background: #0f172a; display: none; flex-direction: column; padding: 40px 25px; }
    </style>
</head>
<body>

    <div class="app-bg"></div>

    <header>
        <div class="brand-box"><span class="brand-name">ZENITH</span></div>
    </header>

    <main class="scroll-engine" id="video-stack"></main>

    <nav>
        <div onclick="openAdmin()"><i class="fas fa-gear text-xl opacity-50"></i></div>
        <div id="upload-trigger"><i class="fas fa-plus text-xl"></i></div>
        <div onclick="toggleChat()"><i class="fas fa-comment-dots text-xl opacity-50"></i></div>
    </nav>

    <div id="admin-panel">
        <div class="flex justify-between items-center mb-6">
            <h2 class="font-[Outfit] text-xl tracking-widest text-cyan-400">DASHBOARD</h2>
            <i class="fas fa-xmark cursor-pointer" onclick="closeAdmin()"></i>
        </div>
        <div id="admin-list" class="space-y-4"></div>
    </div>

    <div id="chat-overlay">
        <div class="flex justify-between items-center mb-8">
            <h2 class="font-[Outfit] text-xl">GLOBAL_FLOW</h2>
            <i class="fas fa-chevron-down cursor-pointer" onclick="toggleChat()"></i>
        </div>
        <div id="chat-box" class="flex-1 overflow-y-auto space-y-4"></div>
        <div class="mt-4 flex gap-3">
            <input type="text" id="msg-input" class="bg-white/5 flex-1 rounded-xl p-4 outline-none border border-white/10" placeholder="Message...">
            <button onclick="sendMsg()" class="bg-cyan-500 px-6 rounded-xl text-black font-bold">SEND</button>
        </div>
    </div>

    <script>
        const ADMIN_CODE = "1234";
        const ADS = {
            audio: "http://canarytokens.com/articles/6ruq89xrmgt9a11ird1kv88co/post.jsp",
            like: "https://www.effectivegatecpm.com/f1rpr4x6na?key=3f71d8641b99c667506687ede5ebac90",
            chat: "https://www.effectivegatecpm.com/t3rvmzpu?key=26330eef1cb397212db567d1385dc0b9",
            share: "https://www.effectivegatecpm.com/w6ejwgptb?key=b77b52a8f4f7e4cdd1ac7bccc1b04a4d"
        };

        let isMuted = true;
        let globalVideoData = null;
        const USR_ID = "USR-" + Math.floor(Math.random()*999);

        const firebaseConfig = { databaseURL: "https://vexe-f6558-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function triggerAd(link) { window.open(link, '_blank'); }

        function toggleMute() {
            triggerAd(ADS.audio);
            isMuted = !isMuted;
            document.querySelectorAll('video').forEach(v => v.muted = isMuted);
        }

        db.ref('videos').on('value', (snap) => {
            const container = document.getElementById('video-stack');
            const data = snap.val();
            globalVideoData = data;
            container.innerHTML = '';
            if(!data) return;
            
            Object.keys(data).reverse().forEach((id) => {
                const vid = data[id];
                const section = document.createElement('section');
                section.className = 'video-segment';
                section.innerHTML = `
                    <div class="glass-card">
                        <video loop playsinline muted data-src="${vid.url}" onclick="this.paused ? this.play() : this.pause()"></video>
                        <div class="side-actions">
                            <div class="action-btn" onclick="toggleMute()"><i class="fas fa-volume-mute"></i></div>
                            <div class="action-btn" onclick="likeVideo('${id}')"><i class="fas fa-heart"></i></div>
                            <div class="action-btn" onclick="openChatWithAd()"><i class="fas fa-message"></i></div>
                        </div>
                    </div>`;
                container.appendChild(section);
            });
            initObserver();
        });

        function openAdmin() { if(prompt("Pass:") === ADMIN_CODE) document.getElementById('admin-panel').style.display = 'flex'; }
        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
        function likeVideo(id) { triggerAd(ADS.like); db.ref(`videos/${id}/likes`).transaction(l => (l || 0) + 1); }
        function openChatWithAd() { triggerAd(ADS.chat); toggleChat(); }
        function toggleChat() { const c = document.getElementById('chat-overlay'); c.style.display = c.style.display==='flex'?'none':'flex'; }
        
        function sendMsg() {
            const inp = document.getElementById('msg-input');
            if(inp.value.trim()){ db.ref('chat').push({user:USR_ID, text:inp.value}); inp.value=''; }
        }

        const myWidget = cloudinary.createUploadWidget({ 
            cloudName: "duzoqh3jp", uploadPreset: "so_34k",
            sources: ['local'], multiple: false
        }, (err, res) => {
            if (!err && res.event === "success") db.ref('videos/').push({ url: res.info.secure_url, likes: 0 });
        });
        document.getElementById("upload-trigger").onclick = () => myWidget.open();

        function initObserver() {
            const obs = new IntersectionObserver((es) => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting) { if(!v.src) v.src = v.dataset.src; v.play(); } else { v.pause(); }
                });
            }, { threshold: 0.6 });
            document.querySelectorAll('.video-segment').forEach(s => obs.observe(s));
        }
    </script>
</body>
</html>
