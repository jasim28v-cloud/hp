<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOID_LION_V24 | ULTIMATE SOCIAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Cairo:wght@400;700;900&display=swap');
        
        :root { --ionic-color: #00f2ff; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; user-select: none; }

        .scroll-engine { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; -webkit-overflow-scrolling: touch; position: relative; z-index: 10; }
        .scroll-engine::-webkit-scrollbar { display: none; }
        
        .v-seg { height: 100vh; width: 100vw; scroll-snap-align: start; scroll-snap-stop: always; position: relative; overflow: hidden; background: #000; }
        .glitch-active { animation: glitch 0.3s ease-in-out; }
        @keyframes glitch { 0% { filter: hue-rotate(90deg) contrast(1.5); } 100% { filter: hue-rotate(0deg); } }

        video { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 5;
            -webkit-mask-image: radial-gradient(circle at center, black 30%, rgba(0,0,0,0.4) 65%, transparent 95%);
            mask-image: radial-gradient(circle at center, black 30%, rgba(0,0,0,0.4) 65%, transparent 95%);
        }

        .digital-clock { position: fixed; top: 35px; left: 25px; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); padding: 8px 15px; border-radius: 12px; border: 1px solid var(--ionic-color); font-family: 'Orbitron'; font-size: 14px; color: var(--ionic-color); z-index: 1000; }
        .live-pulse { position: fixed; top: 90px; left: 25px; display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.5); padding: 5px 12px; border-radius: 20px; font-family: 'Orbitron'; font-size: 10px; border: 1px solid var(--ionic-color); z-index: 1000; color: var(--ionic-color); }

        /* الأزرار الجانبية المجمعة */
        .sidebar-ops { position: absolute; left: 20px; top: 55%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 18px; z-index: 100; }
        .op-btn { width: 56px; height: 56px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1.5px solid var(--ionic-color); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .op-btn i { font-size: 18px; color: var(--ionic-color); }
        .op-btn span { font-size: 8px; font-family: 'Orbitron'; color: #fff; margin-top: 2px; font-weight: bold; }

        #comment-overlay, #admin-panel { position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.97); display: none; flex-direction: column; padding: 40px 25px; backdrop-filter: blur(25px); }
        .watermark { position: absolute; top: 50%; right: 10px; transform: translateY(-50%) rotate(-90deg); font-family: 'Orbitron'; font-size: 9px; color: rgba(255,255,255,0.1); letter-spacing: 5px; z-index: 45; }
    </style>
</head>
<body>

    <div class="digital-clock" id="clock">00:00:00</div>
    <div class="live-pulse"><div class="w-1.5 h-1.5 bg-red-600 rounded-full animate-ping"></div> <span id="online-count">0</span> LIVE</div>
    
    <header class="fixed top-[30px] right-[25px] z-[500] pointer-events-none">
        <div class="bg-black/40 p-[10px_20px] border-r-4 border-[var(--ionic-color)] rounded-lg flex items-center gap-3">
            <i class="fas fa-lion text-2xl text-[var(--ionic-color)]"></i>
            <span class="font-[Orbitron] text-[13px] font-black tracking-[4px]">LION_V24</span>
        </div>
    </header>

    <main class="scroll-engine" id="video-stack"></main>

    <nav class="fixed bottom-[35px] left-1/2 -translate-x-1/2 w-[85%] max-w-[400px] h-[75px] bg-black/70 backdrop-blur-3xl border border-[var(--ionic-color)] rounded-[40px] flex justify-around items-center z-[500]">
        <div class="cursor-pointer text-white/30" onclick="checkAdmin()"><i class="fas fa-fingerprint text-3xl"></i></div>
        <div class="w-16 h-16 bg-gradient-to-br from-[var(--ionic-color)] to-blue-600 rounded-full -mt-10 flex items-center justify-center border-4 border-black shadow-[0_0_20px_var(--ionic-color)] cursor-pointer" onclick="openUpload()"><i class="fas fa-plus text-white text-3xl"></i></div>
        <div class="cursor-pointer text-white/30" onclick="toggleComments()"><i class="fas fa-comments text-3xl"></i></div>
    </nav>

    <div id="comment-overlay">
        <div class="flex justify-between items-center mb-8 border-b border-cyan-900 pb-4">
            <h2 class="font-[Orbitron] text-cyan-400 text-xl tracking-[4px]">COMMS_LINK</h2>
            <i class="fas fa-times text-2xl text-red-500 cursor-pointer" onclick="toggleComments()"></i>
        </div>
        <div id="chat-box" class="flex-1 overflow-y-auto space-y-3 mb-6"></div>
        <div class="flex gap-3 bg-white/5 p-4 rounded-2xl border border-white/10">
            <input type="text" id="msg-input" class="flex-1 bg-transparent outline-none text-cyan-400" placeholder="Type signal...">
            <button onclick="sendSignal()" class="text-cyan-400"><i class="fas fa-paper-plane text-2xl"></i></button>
        </div>
    </div>

    <div id="admin-panel">
        <div class="flex justify-between items-center mb-8 border-b border-red-900 pb-4">
            <h2 class="font-[Orbitron] text-red-500 text-xl font-bold">SYSTEM_PURGE</h2>
            <i class="fas fa-times text-3xl text-white cursor-pointer" onclick="closeAdmin()"></i>
        </div>
        <div class="flex-1 overflow-y-auto space-y-4" id="admin-master-list"></div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://vexe-f6558-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // عداد المتصلين
        const userRef = db.ref('online/' + Math.floor(Math.random()*999));
        userRef.set(true); userRef.onDisconnect().remove();
        db.ref('online').on('value', s => document.getElementById('online-count').innerText = s.numChildren());

        const widget = cloudinary.createUploadWidget({ cloudName: "duzoqh3jp", uploadPreset: "so_34k" }, (e, r) => {
            if (r.event === "success") db.ref('videos/').push({ url: r.info.secure_url, likes: 0, timestamp: Date.now() });
        });
        function openUpload() { widget.open(); }

        const ionicColors = ['#00f2ff', '#ff007f', '#00ff88', '#ffcc00', '#9d00ff'];

        db.ref('videos').on('value', snap => {
            const container = document.getElementById('video-stack');
            const masterList = document.getElementById('admin-master-list');
            container.innerHTML = ''; masterList.innerHTML = '';
            const data = snap.val(); if(!data) return;

            Object.keys(data).reverse().forEach(id => {
                const vid = data[id];
                const section = document.createElement('section');
                section.className = 'v-seg';
                section.innerHTML = `
                    <div class="watermark">VOID_LION</div>
                    <video id="vid-${id}" loop playsinline muted data-src="${vid.url}" onclick="this.paused?this.play():this.pause()"></video>
                    <div class="sidebar-ops">
                        <div class="op-btn" onclick="triggerLike('${id}')"><i class="fas fa-heart"></i><span>${vid.likes || 0}</span></div>
                        <div class="op-btn" onclick="toggleMute('${id}')" id="mute-btn-${id}"><i class="fas fa-volume-xmark"></i><span>AUDIO</span></div>
                        <div class="op-btn" onclick="toggleComments()"><i class="fas fa-comment-dots"></i><span>COMMS</span></div>
                        <div class="op-btn" onclick="share()"><i class="fas fa-share-nodes"></i><span>SHARE</span></div>
                    </div>`;
                container.appendChild(section);
                masterList.innerHTML += `<div class="bg-white/5 p-4 rounded-xl flex justify-between"><span>NODE_${id.substring(0,6)}</span><button onclick="deleteVid('${id}')" class="text-red-500">PURGE</button></div>`;
            });
            initObserver();
        });

        function initObserver() {
            const obs = new IntersectionObserver((es) => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if (e.isIntersecting) { 
                        e.target.classList.add('glitch-active');
                        setTimeout(() => e.target.classList.remove('glitch-active'), 300);
                        if(!v.src) v.src = v.dataset.src;
                        v.play().catch(()=>{}); 
                        document.documentElement.style.setProperty('--ionic-color', ionicColors[Math.floor(Math.random() * 5)]);
                    } else { v.pause(); }
                });
            }, { threshold: 0.7 });
            document.querySelectorAll('.v-seg').forEach(s => obs.observe(s));
        }

        function toggleComments() { const o = document.getElementById('comment-overlay'); o.style.display = (o.style.display==='flex')?'none':'flex'; }
        function sendSignal() {
            const inp = document.getElementById('msg-input');
            if(inp.value.trim()) { db.ref('vox_chat').push({ text: inp.value }); inp.value = ''; }
        }
        db.ref('vox_chat').on('value', s => {
            const box = document.getElementById('chat-box'); box.innerHTML = '';
            s.forEach(m => { box.innerHTML += `<div class="bg-white/5 p-3 rounded-lg border-r-2 border-[var(--ionic-color)] text-[11px]">SIGNAL:: ${m.val().text}</div>`; });
            box.scrollTop = box.scrollHeight;
        });

        function toggleMute(id) {
            const v = document.getElementById('vid-'+id);
            const btn = document.getElementById('mute-btn-'+id);
            v.muted = !v.muted;
            btn.innerHTML = v.muted ? '<i class="fas fa-volume-xmark"></i><span>AUDIO</span>' : '<i class="fas fa-volume-high text-white"></i><span>LIVE</span>';
        }
        function share() { if(navigator.share) { navigator.share({title: 'LION_VOID', url: window.location.href}); } else { alert("Link Copied!"); } }
        function checkAdmin() { if(prompt("ACCESS:") === "1234") document.getElementById('admin-panel').style.display = 'flex'; }
        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
        function deleteVid(id) { if(confirm("Purge?")) db.ref('videos/' + id).remove(); }
        function triggerLike(id) { db.ref('videos/' + id + '/likes').transaction(l => (l || 0) + 1); }
        setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'), 1000);
    </script>
</body>
</html>
