<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VØID_X | TEST MODE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Cairo:wght@400;700&display=swap');
        
        :root { --neon: #ff007f; --bg: #050002; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; user-select: none; }

        .pink-void-bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 50%, #1a000d 0%, #000 100%); }
        
        .scroll-engine { 
            height: 100vh; 
            overflow-y: scroll; 
            scroll-snap-type: y mandatory; 
            scrollbar-width: none; 
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        .scroll-engine::-webkit-scrollbar { display: none; }
        
        .video-segment { height: 100vh; width: 100vw; scroll-snap-align: start; scroll-snap-stop: always; position: relative; overflow: hidden; }
        .crystal-frame { width: 100%; height: 100%; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        header { position: fixed; top: 25px; left: 20px; right: 20px; z-index: 500; display: flex; justify-content: space-between; align-items: center; pointer-events: none; }
        .brand-box { padding: 8px 22px; border-radius: 20px; border-left: 4px solid var(--neon); background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); pointer-events: auto; }
        .brand-name { font-family: 'Orbitron', sans-serif; font-weight: 900; letter-spacing: 2px; color: #fff; text-shadow: 0 0 15px var(--neon); }

        .v-watermark { position: absolute; top: 20%; right: 10%; font-family: 'Orbitron'; font-size: 0.8rem; color: rgba(255,255,255,0.15); z-index: 20; letter-spacing: 4px; animation: floatMark 10s infinite; }
        @keyframes floatMark { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(-20px, 40px); } }

        .side-actions { position: absolute; left: 20px; bottom: 180px; display: flex; flex-direction: column; gap: 15px; z-index: 100; }
        .action-btn { width: 55px; height: 55px; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        .action-btn i { font-size: 1.3rem; color: var(--neon); filter: drop-shadow(0 0 8px var(--neon)); }
        .btn-label { font-size: 9px; font-weight: bold; margin-top: 2px; color: #fff; opacity: 0.7; font-family: 'Orbitron'; }

        nav { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; height: 75px; border-radius: 35px; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-around; align-items: center; z-index: 200; }
        .finger-admin { color: var(--neon); cursor: pointer; filter: drop-shadow(0 0 10px var(--neon)); }

        #upload-trigger { background: var(--neon); box-shadow: 0 0 25px var(--neon); cursor: pointer; width: 62px; height: 62px; border-radius: 22px; display: flex; align-items: center; justify-content: center; transform: translateY(-15px); border: 4px solid var(--bg); }

        /* شاشة رفع الرابط المباشر */
        #url-upload-panel {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(10,0,5,0.98); backdrop-filter: blur(20px);
            padding: 30px; border-radius: 30px; z-index: 1000;
            border: 1px solid var(--neon); width: 90%; max-width: 400px;
            display: none; flex-direction: column; gap: 20px;
        }

        /* شريط الحالة */
        #status-bar {
            position: fixed; bottom: 120px; left: 20px; right: 20px;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
            padding: 10px 20px; border-radius: 30px; z-index: 300;
            display: flex; align-items: center; gap: 10px; font-size: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="pink-void-bg"></div>

    <header>
        <div class="brand-box"><span class="brand-name">VØID_X</span></div>
        <div class="text-[11px] font-[Orbitron] text-white/80 px-4 py-2 rounded-full border" id="clock">00:00:00</div>
    </header>

    <!-- شريط حالة الاتصال -->
    <div id="status-bar">
        <i class="fas fa-circle text-[10px]" id="conn-status-icon" style="color: #ff4444;"></i>
        <span id="conn-status-text">جاري الاتصال بـ Firebase...</span>
        <span id="video-count-display" class="mr-auto opacity-50"></span>
    </div>

    <main class="scroll-engine" id="video-stack"></main>

    <!-- نافذة إدخال رابط مباشر -->
    <div id="url-upload-panel">
        <h3 class="font-[Orbitron] text-pink-500 text-center">إضافة فيديو مباشر</h3>
        <input type="text" id="direct-url-input" placeholder="ضع رابط الفيديو هنا (mp4)" 
               class="bg-white/10 p-4 rounded-2xl border border-white/20 outline-none text-white" dir="ltr">
        <button onclick="uploadDirectUrl()" class="bg-pink-600 p-4 rounded-2xl font-bold">
            <i class="fas fa-cloud-upload-alt ml-2"></i> رفع الرابط
        </button>
        <button onclick="toggleUrlPanel()" class="bg-white/10 p-3 rounded-2xl text-sm">إلغاء</button>
        <p class="text-[10px] text-white/40 text-center">مثال: https://example.com/video.mp4</p>
    </div>

    <nav id="main-nav">
        <div class="finger-admin" onclick="openAdmin()"><i class="fas fa-fingerprint text-3xl"></i></div>
        <div id="upload-trigger" onclick="toggleUrlPanel()"><i class="fas fa-link text-2xl text-white"></i></div>
        <div onclick="toggleChat()" style="color: rgba(255,255,255,0.3);"><i class="fas fa-comment-dots text-2xl"></i></div>
    </nav>

    <script>
        // ================= إعدادات Firebase =================
        const firebaseConfig = { databaseURL: "https://vexe-f6558-default-rtdb.firebaseio.com/" };
        
        let db;
        let firebaseConnected = false;
        
        try {
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();
            console.log("✅ Firebase initialized");
        } catch (e) {
            console.error("❌ Firebase init error:", e);
            updateStatus(false, "خطأ في تهيئة Firebase");
        }

        // ================= تحديث حالة الاتصال =================
        function updateStatus(connected, text) {
            firebaseConnected = connected;
            const icon = document.getElementById('conn-status-icon');
            const statusText = document.getElementById('conn-status-text');
            if (connected) {
                icon.style.color = '#00ffaa';
                statusText.textContent = text || 'متصل بـ Firebase';
            } else {
                icon.style.color = '#ff4444';
                statusText.textContent = text || 'غير متصل بـ Firebase';
            }
        }

        // اختبار الاتصال
        if (db) {
            const connectedRef = db.ref(".info/connected");
            connectedRef.on("value", (snap) => {
                if (snap.val() === true) {
                    updateStatus(true, "متصل بـ Firebase ✅");
                } else {
                    updateStatus(false, "منفصل عن Firebase ❌");
                }
            });
        }

        // ================= المتغيرات العامة =================
        const ADMIN_CODE = "1234";
        let isMuted = true;
        let globalVideoData = null;
        const USR_ID = "ION-" + Math.floor(Math.random()*999);

        // ================= الساعة =================
        setInterval(() => { 
            const el = document.getElementById('clock');
            if(el) el.innerText = new Date().toLocaleTimeString('en-GB'); 
        }, 1000);

        // ================= فتح/إغلاق نافذة الرابط =================
        function toggleUrlPanel() {
            const panel = document.getElementById('url-upload-panel');
            panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex';
        }

        // ================= رفع رابط مباشر =================
        function uploadDirectUrl() {
            const input = document.getElementById('direct-url-input');
            const url = input.value.trim();
            
            if (!url) {
                alert("الرجاء إدخال رابط الفيديو");
                return;
            }
            
            if (!url.startsWith('http')) {
                alert("الرابط يجب أن يبدأ بـ http أو https");
                return;
            }
            
            if (!db) {
                alert("Firebase غير متصل. تحقق من الاتصال.");
                return;
            }
            
            console.log("🚀 Uploading URL:", url);
            
            db.ref('videos/').push({ 
                url: url, 
                likes: 0, 
                timestamp: Date.now() 
            }).then(() => {
                console.log("✅ Video added successfully!");
                input.value = '';
                toggleUrlPanel();
                alert("✅ تمت إضافة الفيديو بنجاح!");
            }).catch(err => {
                console.error("❌ Upload error:", err);
                alert("❌ فشل الرفع: " + err.message);
            });
        }

        // ================= استقبال الفيديوهات من Firebase =================
        if (db) {
            db.ref('videos').on('value', (snap) => {
                const container = document.getElementById('video-stack');
                const data = snap.val();
                globalVideoData = data; 
                container.innerHTML = '';
                
                const count = data ? Object.keys(data).length : 0;
                document.getElementById('video-count-display').innerText = count + ' فيديو';
                
                if(!data) {
                    container.innerHTML = `
                        <div class="video-segment flex items-center justify-center">
                            <div class="text-center opacity-50">
                                <i class="fas fa-film text-6xl mb-4"></i>
                                <p class="font-[Orbitron]">لا توجد فيديوهات</p>
                                <p class="text-sm mt-2">اضغط على + لإضافة رابط فيديو</p>
                            </div>
                        </div>`;
                    return;
                }
                
                const fragment = document.createDocumentFragment();
                Object.keys(data).reverse().forEach((id) => {
                    const vid = data[id];
                    const section = document.createElement('section');
                    section.className = 'video-segment';
                    section.innerHTML = `
                        <div class="crystal-frame">
                            <div class="v-watermark">VØID_X SUPREME</div>
                            <video loop playsinline muted data-src="${vid.url}" onclick="this.paused ? this.play() : this.pause()"></video>
                            <div class="side-actions">
                                <div class="action-btn" onclick="toggleMute()">
                                    <i class="${isMuted ? 'fas fa-volume-xmark' : 'fas fa-volume-high'} mute-trigger-icon"></i>
                                    <span class="btn-label">AUDIO</span>
                                </div>
                                <div class="action-btn" onclick="likeVideo('${id}')">
                                    <i class="fas fa-bolt"></i>
                                    <span class="btn-label">${vid.likes || 0}</span>
                                </div>
                                <div class="action-btn" onclick="toggleChat()">
                                    <i class="fas fa-terminal"></i>
                                    <span class="btn-label">CHAT</span>
                                </div>
                            </div>
                        </div>`;
                    fragment.appendChild(section);
                });
                container.appendChild(fragment);
                initObserver();
            });
        }

        // ================= التحكم في الصوت =================
        function toggleMute() {
            isMuted = !isMuted;
            document.querySelectorAll('video').forEach(v => v.muted = isMuted);
            const icon = isMuted ? 'fas fa-volume-xmark' : 'fas fa-volume-high';
            document.querySelectorAll('.mute-trigger-icon').forEach(i => i.className = icon + ' mute-trigger-icon');
        }

        // ================= إعجاب =================
        function likeVideo(id) { 
            if(db) db.ref(`videos/${id}/likes`).transaction(l => (l || 0) + 1); 
        }

        // ================= الشات =================
        function toggleChat() {
            // يمكنك إضافة نافذة الشات هنا لاحقًا
            alert("سيتم تفعيل الشات قريباً");
        }

        // ================= لوحة الأدمن =================
        function openAdmin() { 
            if(prompt("ADMIN PASS:") === ADMIN_CODE) {
                alert("تم الدخول كأدمن");
                // يمكنك إضافة لوحة الأدمن هنا
            }
        }

        // ================= مراقب الفيديوهات (تشغيل تلقائي) =================
        function initObserver() {
            const obs = new IntersectionObserver((es) => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting) { 
                        if(!v.src) v.src = v.dataset.src;
                        v.muted = isMuted;
                        v.play().catch(e => console.log("Play prevented:", e));
                    } else { 
                        v.pause(); 
                    }
                });
            }, { threshold: 0.6 });
            document.querySelectorAll('.video-segment').forEach(s => obs.observe(s));
        }

        // ================= اختبار سريع - أضف فيديو تجريبي =================
        console.log("💡 للتجربة السريعة، استخدم هذا الأمر في الكونسول:");
        console.log("db.ref('videos/').push({ url: 'https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4', likes: 0, timestamp: Date.now() })");
    </script>
</body>
</html>
